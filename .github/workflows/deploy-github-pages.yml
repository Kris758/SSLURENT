# Publishes the Vite `dist/` folder. GitHub Pages must use this workflow — NOT
# "Deploy from a branch" (Jekyll). Jekyll never runs `npm run build` and will
# break or skip parts of this SPA.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build
        env:
          # User/org site: repo named OWNER.github.io → served at site root (`base: /`).
          # Otherwise project site at https://OWNER.github.io/REPO/ → `base: /REPO/`.
          VITE_PAGES_BASE: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build
      - name: SPA fallback (client-side routes)
        run: cp dist/index.html dist/404.html
      - name: Disable Jekyll on published site (static files only)
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
